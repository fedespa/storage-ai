services:
  postgres:
    image: postgres:16-alpine
    container_name: storage-ai-db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - storage-ai-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  storage-ai-net:
    driver: bridge
    name: storage-ai-net

volumes:
  postgres_data: