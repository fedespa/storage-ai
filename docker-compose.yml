services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend_container
    expose:
      - "3000"
    env_file:
      - .env
    depends_on:
      - postgres
    networks:
      - storage-ai-net
  postgres:
    image: pgvector/pgvector:pg16
    container_name: db_container
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - storage-ai-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 3s
      timeout: 3s
      retries: 3
      start_period: 5s
  nginx:
    image: nginx:alpine
    container_name: nginx_container
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - storage-ai-net

networks:
  storage-ai-net:
    driver: bridge
    name: storage-ai-net

volumes:
  postgres_data: